name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake make shellcheck

      - name: Build applications
        run: bash ./build_all.sh

      - name: Lint shell scripts
        run: shellcheck build_all.sh deploy_all.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          REPO_ROOT="$(git rev-parse --show-toplevel)"
          PROJECT_ROOT="$REPO_ROOT"
          if [ ! -d "$PROJECT_ROOT/apps" ] && [ -d "$REPO_ROOT/Embedded_Devops/apps" ]; then
            PROJECT_ROOT="$REPO_ROOT/Embedded_Devops"
          fi

          echo "Using repository root: $REPO_ROOT"
          echo "Using project root: $PROJECT_ROOT"

          APPS=(freertos_app gcc_app zephyr_app)
          BUILT_COUNT=0

          for APP in "${APPS[@]}"; do
            APP_DIR="$PROJECT_ROOT/apps/$APP"
            DOCKERFILE="$PROJECT_ROOT/docker/Dockerfile.${APP%%_app}"
            IMAGE_NAME="${APP%%_app}-app:latest"

            if [ ! -d "$APP_DIR" ]; then
              echo "Skipping $APP: app directory not found at $APP_DIR"
              continue
            fi

            if [ ! -f "$DOCKERFILE" ]; then
              echo "Skipping $APP: Dockerfile not found at $DOCKERFILE"
              continue
            fi

            echo "Building image $IMAGE_NAME from $APP_DIR"
            (cd "$APP_DIR" && docker buildx build --load -f "$DOCKERFILE" -t "$IMAGE_NAME" .)
            BUILT_COUNT=$((BUILT_COUNT + 1))
          done

          if [ "$BUILT_COUNT" -eq 0 ]; then
            echo "No buildable app contexts found under $PROJECT_ROOT/apps"
            ls -la "$PROJECT_ROOT" || true
            ls -la "$PROJECT_ROOT/apps" || true
            ls -la "$PROJECT_ROOT/docker" || true
            exit 1
          fi

          echo "Built $BUILT_COUNT Docker image(s)."

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate and deploy to Kubernetes (when KUBE_CONFIG is available)
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG secret not set; skipping manifest validation and deployment."
            exit 0
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config"

          # Validate against the target cluster schema before applying.
          kubectl apply --dry-run=server -f k8s/manifest.yaml
          kubectl apply -f k8s/manifest.yaml