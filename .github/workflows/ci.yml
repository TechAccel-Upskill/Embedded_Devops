name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake make shellcheck

      - name: Build applications
        run: bash ./build_all.sh

      - name: Lint shell scripts
        run: shellcheck build_all.sh deploy_all.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          REPO_ROOT="$(git rev-parse --show-toplevel)"
          echo "Using repository root: $REPO_ROOT"

          test -d "$REPO_ROOT/apps/freertos_app" && test -d "$REPO_ROOT/apps/gcc_app" && test -d "$REPO_ROOT/apps/zephyr_app"
          test -f "$REPO_ROOT/docker/Dockerfile.freertos" && test -f "$REPO_ROOT/docker/Dockerfile.gcc" && test -f "$REPO_ROOT/docker/Dockerfile.zephyr"

          (cd "$REPO_ROOT/apps/freertos_app" && docker buildx build --load -f "$REPO_ROOT/docker/Dockerfile.freertos" -t freertos-app:latest .)
          (cd "$REPO_ROOT/apps/gcc_app" && docker buildx build --load -f "$REPO_ROOT/docker/Dockerfile.gcc" -t gcc-app:latest .)
          (cd "$REPO_ROOT/apps/zephyr_app" && docker buildx build --load -f "$REPO_ROOT/docker/Dockerfile.zephyr" -t zephyr-app:latest .)

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifest structure
        run: kubectl apply --dry-run=client --validate=false -f k8s/manifest.yaml

      - name: Deploy to Kubernetes (when KUBE_CONFIG is available)
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG secret not set; skipping cluster deployment."
            exit 0
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config"
          kubectl apply -f k8s/manifest.yaml