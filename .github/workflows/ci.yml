name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake make shellcheck

      - name: Build applications
        run: bash ./build_all.sh

      - name: Lint shell scripts
        run: shellcheck build_all.sh deploy_all.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          REPO_ROOT="$(git rev-parse --show-toplevel)"
          PROJECT_ROOT="$REPO_ROOT"
          if [ ! -d "$PROJECT_ROOT/apps" ] && [ -d "$REPO_ROOT/Embedded_Devops/apps" ]; then
            PROJECT_ROOT="$REPO_ROOT/Embedded_Devops"
          fi

          echo "Using repository root: $REPO_ROOT"
          echo "Using project root: $PROJECT_ROOT"

          if [ ! -d "$PROJECT_ROOT/apps/freertos_app" ] || [ ! -d "$PROJECT_ROOT/apps/gcc_app" ] || [ ! -d "$PROJECT_ROOT/apps/zephyr_app" ]; then
            echo "Expected app directories were not found under $PROJECT_ROOT/apps"
            ls -la "$PROJECT_ROOT" || true
            ls -la "$PROJECT_ROOT/apps" || true
            exit 1
          fi

          if [ ! -f "$PROJECT_ROOT/docker/Dockerfile.freertos" ] || [ ! -f "$PROJECT_ROOT/docker/Dockerfile.gcc" ] || [ ! -f "$PROJECT_ROOT/docker/Dockerfile.zephyr" ]; then
            echo "Expected Dockerfiles were not found under $PROJECT_ROOT/docker"
            ls -la "$PROJECT_ROOT/docker" || true
            exit 1
          fi

          (cd "$PROJECT_ROOT/apps/freertos_app" && docker buildx build --load -f "$PROJECT_ROOT/docker/Dockerfile.freertos" -t freertos-app:latest .)
          (cd "$PROJECT_ROOT/apps/gcc_app" && docker buildx build --load -f "$PROJECT_ROOT/docker/Dockerfile.gcc" -t gcc-app:latest .)
          (cd "$PROJECT_ROOT/apps/zephyr_app" && docker buildx build --load -f "$PROJECT_ROOT/docker/Dockerfile.zephyr" -t zephyr-app:latest .)

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifest structure
        run: kubectl apply --dry-run=client --validate=false -f k8s/manifest.yaml

      - name: Deploy to Kubernetes (when KUBE_CONFIG is available)
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG secret not set; skipping cluster deployment."
            exit 0
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config"
          kubectl apply -f k8s/manifest.yaml