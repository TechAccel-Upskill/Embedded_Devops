apiVersion: apps/v1
kind: Deployment
metadata:
  name: zephyr-app
  namespace: embedded-os
  labels:
    app: zephyr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zephyr
  template:
    metadata:
      labels:
        app: zephyr
    spec:
      containers:
      - name: zephyr-container
        image: zephyr-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: APP_NAME
          value: "zephyr-app"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "750m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "ps aux | grep zephyr_app || exit 1"
          initialDelaySeconds: 10
          periodSeconds: 30
            cpu: "1"