name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git
    
    - name: Build FreeRTOS app with CMake
      run: |
        cd apps/freertos_app
        mkdir -p build
        cd build
        cmake ..
        make
        cd ../../..
    
    - name: Build FreeRTOS app with Make
      run: |
        cd apps/freertos_app
        make clean || true
        make
        cd ../..
    
    - name: Build Mbed app with CMake
      run: |
        cd apps/mbed_app
        mkdir -p build
        cd build
        cmake ..
        make
        cd ../../..
    
    - name: Build Mbed app with Make
      run: |
        cd apps/mbed_app
        make clean || true
        make
        cd ../..
    
    - name: Build Zephyr app with CMake
      run: |
        cd apps/zephyr_app
        mkdir -p build
        cd build
        cmake ..
        make
        cd ../../..
    
    - name: Build Zephyr app with Make
      run: |
        cd apps/zephyr_app
        make clean || true
        make
        cd ../..
  
  docker-build:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build FreeRTOS Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile.freertos
        push: false
        tags: freertos-app:latest
    
    - name: Build Mbed Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile.mbed
        push: false
        tags: mbed-app:latest
    
    - name: Build Zephyr Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile.zephyr
        push: false
        tags: zephyr-app:latest
  
  validate-k8s:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install kubeval
      run: |
        wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
        tar xf kubeval-linux-amd64.tar.gz
        sudo mv kubeval /usr/local/bin
    
    - name: Validate Kubernetes manifests
      run: |
        kubeval k8s/namespace.yaml
        kubeval k8s/services.yaml
        kubeval k8s/freertos-deployment.yaml
        kubeval k8s/mbed-deployment.yaml
        kubeval k8s/zephyr-deployment.yaml

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check shell scripts
      run: |
        sudo apt-get install -y shellcheck
        shellcheck build_all.sh deploy_all.sh
          echo "Deployed ${{ matrix.os_sdk }} application to Kubernetes"