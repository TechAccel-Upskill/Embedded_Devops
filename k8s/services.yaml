---
# FreeRTOS Service
apiVersion: v1
kind: Service
metadata:
  name: freertos-service
  namespace: embedded-os
  labels:
    app: freertos
    version: v1
  annotations:
    description: "Service for FreeRTOS application pods"
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 300
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: freertos
---
# Mbed OS Service
apiVersion: v1
