apiVersion: v1
kind: Namespace
metadata:
  name: embedded-os
  labels:
    name: embedded-os
    version: v1
  annotations:
    description: "Namespace for embedded OS applications (FreeRTOS, Mbed OS, Zephyr)"
---
# Resource Quota to prevent resource exhaustion
apiVersion: v1
kind: ResourceQuota
metadata:
  name: embedded-os-quota
  namespace: embedded-os
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "1Gi"
    limits.cpu: "4"
    limits.memory: "2Gi"
    pods: "20"
---
# Network Policy to restrict traffic to safe patterns
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: embedded-os-network-policy
  namespace: embedded-os
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
  egress:
  - to:
    - podSelector: {}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
